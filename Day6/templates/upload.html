{% extends "base.html" %}

{% block title %}上传头像 - 用户管理系统{% endblock %}

{% block content %}
<div class="card">
    <h2>上传头像</h2>

    <form method="post" action="/upload" enctype="multipart/form-data" class="upload-form">
        <div class="form-group">
            <label for="file">选择图片文件</label>
            <input type="file" id="file" name="file" class="file-input">
        </div>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <button type="submit" class="btn btn-primary">上 传</button>
    </form>

    {% if success %}
    <div class="upload-result">
        <div class="success-message">上传成功！</div>
        <div class="preview-section">
            <h3>图片预览</h3>
            <img src="{{ file_url }}" alt="{{ filename }}" class="preview-image">
            <p class="file-link">
                文件链接：<a href="{{ file_url }}" target="_blank">{{ file_url }}</a>
            </p>
            <p class="file-name">文件名：{{ filename }}</p>
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}
